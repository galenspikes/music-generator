name: Sync app to Hugging Face Space

# Mirrors the app (Dockerfile, requirements.txt, the engine modules, library/,
# songs/, docs/, site/, webapp/) to the Space's own git repo whenever any of it
# changes on main, using space/README.md as the Space's README (it carries the
# HF metadata frontmatter the root README doesn't). The Space rebuilds its
# Docker image from this on every push. Requires an HF_TOKEN repo secret with
# write access to the Space (Settings -> Secrets and variables -> Actions).
# Without it, the job is a no-op instead of a failure.
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "requirements.txt"
      - "*.py"
      - "library/**"
      - "songs/**"
      - "docs/**"
      - "site/**"
      - "webapp/**"
      - "space/README.md"
      - ".github/workflows/deploy-space.yml"
  workflow_dispatch:

concurrency:
  group: hf-space
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push the app to the Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: gsp87/music-generator
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is not set — skipping sync."
            echo "Add it under Settings → Secrets and variables → Actions to enable."
            exit 0
          fi
          git clone "https://gsp87:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" hf-space
          rsync -a --delete \
            --exclude='.git' \
            --exclude-from='.dockerignore' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='space' \
            --exclude='requirements-dev.txt' \
            --exclude='requirements-docs.txt' \
            --exclude='mkdocs.yml' \
            ./ hf-space/
          cp space/README.md hf-space/README.md
          cd hf-space
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "Sync from GitHub ${GITHUB_SHA:0:7}"
            git push
          fi
