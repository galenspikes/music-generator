name: Deploy showcase to GitHub Pages

# This is the SINGLE authoritative publisher of the GitHub Pages site: it serves
# the static showcase in `site/` at the Pages root. Do not add a second workflow
# that runs `deploy-pages` — each deployment replaces the whole site, so two
# publishers race on the `pages` concurrency group and the last one wins. To add
# another surface (e.g. the PWA on branch claude/ios-app-feasibility-yozsr3),
# assemble it into this job's artifact under a subpath (e.g. `site/app/`) so a
# single deploy publishes everything. See docs/design-notes/ecosystem-navigation-plan.md.

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
