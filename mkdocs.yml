site_name: Music Generator docs
site_description: >-
  A token DSL for chords, percussion, and melody → harmony + voices + percussion
  → MIDI. Tutorials, how-to guides, the token-grammar reference, and design notes.
site_url: https://galenspikes.github.io/music-generator/docs/
repo_url: https://github.com/galenspikes/music-generator
repo_name: galenspikes/music-generator
edit_uri: edit/main/docs/
copyright: Music Generator · MIT licensed · Galen Spikes

# Published to GitHub Pages under /docs/ by .github/workflows/pages.yml, which
# builds into a staging dir. site_dir here is deliberately NOT "site" (that's the
# static showcase) so a local `mkdocs build` can't clobber the showcase.
docs_dir: docs
site_dir: _site_docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details

# The showcase, live instrument, and repo — same wayfinding set as the other
# surfaces (see docs/design-notes/ecosystem-navigation-plan.md).
extra:
  social:
    - icon: fontawesome/solid/house
      link: https://galenspikes.github.io/music-generator/
      name: Showcase
    - icon: fontawesome/solid/play
      link: https://huggingface.co/spaces/gsp87/music-generator
      name: Live instrument
    - icon: fontawesome/brands/github
      link: https://github.com/galenspikes/music-generator
      name: GitHub

