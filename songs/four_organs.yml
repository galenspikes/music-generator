# demonstrates: minimalist process music in the arrangement layer — one chord
# (E dominant 11th) held for the whole piece while `chord_length` grows section
# by section (e -> q -> h -> w) over an unbroken maracas pulse. Uses `bars:` for
# exact section lengths and `fill_rate: 0.0` to never break the pulse.
#
# After Steve Reich, "Four Organs" (1970) — a process/impression, not a transcription.
# One chord (E dominant 11th) for the whole piece; maracas hold an unbroken
# eighth-note pulse; the chord AUGMENTS section by section (chord_length grows
# e -> q -> h -> w) so a tight pulsing attack slowly stretches into a vast
# sustained sonority. Tempo: eighth = ca.200  ->  quarter = 100 bpm.
#
# NOTE: our section granularity is coarser than Reich's per-note augmentation,
# so this is a convincing impression. The four SATB voice-channels = four organs.
title: Four Organs (process, after Reich)
description: After Steve Reich (1970). One chord slowly augments from eighth-note pulse to vast sustained sonority.
tempo: 100
soundfont: SoundFonts/arachno.sf2

defaults:
  instrument: organ
  satb: block            # organs strike the chord as a block, then sustain
  bass: { style: follow }
  perc:
    main: "ez,ez,ez,ez,ez,ez,ez,ez"   # maracas: unbroken eighth notes
    fill_rate: 0.0                      # never breaks the pulse
  chord_length: e
  chords_order: roundrobin

sections:
  # --- tight pulsing chord (eighth-note attacks) ---
  - { name: pulse_a, chord_length: e, bars: 6,  keys: "E::11" }
  - { name: pulse_b, chord_length: e, bars: 6,  keys: "E::11" }
  # --- first augmentation: quarter-note attacks ---
  - { name: aug_quarter, chord_length: q, bars: 8,  keys: "E::11" }
  # --- half notes ---
  - { name: aug_half, chord_length: h, bars: 10, keys: "E::11" }
  # --- whole notes: the chord opening out ---
  - { name: aug_whole, chord_length: w, bars: 14, keys: "E::11" }
  # --- the vast sustained sonority ---
  - { name: expanse, chord_length: w, bars: 16, keys: "E::11" }
