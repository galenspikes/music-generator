# demonstrates: the flagship — a full multi-section pop song with a dynamic arc.
# Per-section tempo map, slash/pedal bass, a saw lead brought in over the hooks,
# percussion interrupters, and a fill-rate curve that builds and releases so the
# piece plays like a finished record rather than a loop. This is the "press demo"
# song. See docs/explanation/song-studies/kiss-on-my-list.md for the chart study.
title: Kiss On My List (Hall & Oates)
description: >
  The star demo. Full arrangement — intro, two verse/pre-chorus/chorus cycles, a
  synth solo, a breakdown, and a lifted final chorus into the outro. Electric
  piano + electric bass, a saw lead over the hooks, and an evolving groove.
tempo: 148
soundfont: SoundFonts/arachno.sf2

# Concert pitch (capo-3 shapes + 3 semitones); the chorus rides a C pedal.
defaults:
  instrument: epiano
  voices: { bass: 33 }          # electric bass (finger)
  bass: { style: octaves, step: 0.5 }
  satb: arpeggio
  chord_length: h
  chords_order: roundrobin
  perc:
    main: "ebg,eg,ecg,eg, ebg,eg,ecg,eg"
    interrupters:
      - "ebg,eg,ecg,eg, ebg,eg,ecg,ei"
      - "sb,sc,sb,sc,sg,sg,sj"
    fill_rate: 0.18

sections:
  # ── Intro: calm, block chords, no drums ──────────────────────────────
  - name: intro
    tempo: 140
    repeat: 2
    satb: block
    bass: { style: root }
    perc: { fill_rate: 0.0 }
    keys: "G::maj, C::maj, G::maj, Eb::maj, F::maj, C::maj"

  # ── Verse 1: gentle groove opens up ──────────────────────────────────
  - name: verse1
    tempo: 148
    repeat: 2
    bass: { style: root }
    perc: { fill_rate: 0.10 }
    keys: "C::min, F::min7, Ab::maj, Ab::maj/Bb, C::maj, C::min, F::min9, F::min, Ab::maj, Ab::maj/Bb, C::maj"

  # ── Pre-chorus 1: the lift into the hook ─────────────────────────────
  - name: prechorus1
    tempo: 148
    repeat: 1
    perc: { fill_rate: 0.18 }
    keys: "F::min7, G::sus4/D, F::min7, G::sus4/D, F::min7, G::sus4/D, F::min7, F::maj/G, G::7"

  # ── Chorus 1: peak — octave bass, saw lead, busy drums ───────────────
  - name: chorus1
    tempo: 150
    repeat: 2
    bass: { style: octaves }
    voices: { bass: 33, soprano: saw }   # bring the lead in over the chorus
    perc: { fill_rate: 0.30 }
    keys: "G::maj, C::maj, G::maj/C, F::maj/C, G::maj/C, C::min, Bb::maj/C, C::min, F::maj, G::maj/C, C::maj, G::maj/C, C::maj"

  # ── Verse 2: reprise, one pass ───────────────────────────────────────
  - name: verse2
    tempo: 148
    repeat: 1
    bass: { style: root }
    perc: { fill_rate: 0.12 }
    keys: "C::min, F::min7, Ab::maj, Ab::maj/Bb, C::maj, C::min, F::min9, F::min, Ab::maj, Ab::maj/Bb, C::maj"

  # ── Pre-chorus 2: the D::min11 variant (Bm7add11) ────────────────────
  - name: prechorus2
    tempo: 148
    repeat: 1
    perc: { fill_rate: 0.20 }
    keys: "F::min7, G::sus4/D, F::min7, G::sus4/D, D::min11, G::sus4/D, F::min7, F::maj/G, G::7"

  # ── Chorus 2: peak again ─────────────────────────────────────────────
  - name: chorus2
    tempo: 150
    repeat: 2
    bass: { style: octaves }
    voices: { bass: 33, soprano: saw }
    perc: { fill_rate: 0.32 }
    keys: "G::maj, C::maj, G::maj/C, F::maj/C, G::maj/C, C::min, Bb::maj/C, C::min, F::maj, G::maj/C, C::maj, G::maj/C, C::maj"

  # ── Solo: saw takes over, walking bass ───────────────────────────────
  - name: solo
    tempo: 152
    repeat: 1
    instrument: saw
    bass: { style: walking, step: 1.0 }
    perc: { fill_rate: 0.22 }
    keys: "C::maj7, C::maj7, F::maj7, F::maj7, F::7/Eb, F::7/Eb, G::sus4/D, G::sus4add7, C::maj7, C::maj7, F::maj7, F::maj7, F::7/Eb, F::7/Eb, D::min7, G::sus4add7"

  # ── Breakdown: thin, minor, lets the song breathe ────────────────────
  - name: breakdown
    tempo: 146
    repeat: 1
    satb: block
    bass: { style: root }
    perc: { fill_rate: 0.04 }
    keys: "C::min, F::min9, Ab::maj, Ab::maj/Bb, C::min, F::min7"

  # ── Final chorus: the biggest lift ───────────────────────────────────
  - name: final_chorus
    tempo: 150
    repeat: 2
    bass: { style: octaves }
    voices: { bass: 33, soprano: saw }
    perc: { fill_rate: 0.35 }
    keys: "G::maj, C::maj, G::maj/C, F::maj/C, G::maj/C, C::min, Bb::maj/C, C::min, F::maj, G::maj/C, C::maj, G::maj/C, C::maj"

  # ── Outro: settle out ────────────────────────────────────────────────
  - name: outro
    tempo: 146
    repeat: 2
    perc: { fill_rate: 0.08 }
    keys: "G::maj, C::maj, G::maj/C, F::maj/C, G::maj/C, C::min, Bb::maj/C, C::min, F::maj, G::maj/C, C::maj, G::maj/C, C::maj"
